# Minimal Headscale config for the local ShadowVPN-over-Headscale integration
# test (docker/headscale/run-headscale-e2e.sh). Baked into a small image on top
# of the official Headscale (see Dockerfile) because the repo lives on a path
# Docker Desktop won't bind-mount.
#
# The control plane is served over plain HTTP on :8080 (mapped to host :18080);
# tailscale-ss reaches it with the `insecure-keyfetch` feature. Data-plane relay
# uses Tailscale's public DERP servers (needs outbound internet).

server_url: http://127.0.0.1:18080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: false

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: false
  update_frequency: 24h

disable_check_updates: true
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

log:
  level: info

dns:
  magic_dns: false
  base_domain: tailnet.test
  nameservers:
    global:
      - 1.1.1.1

# Load an allow-all ACL from file so the two test nodes may reach each other.
policy:
  mode: file
  path: /etc/headscale/policy.json
